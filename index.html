  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(10, 30, 70, 0.45);
    z-index: 0;
    pointer-events: none;
  }

  .container {
    max-width: 580px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.7s ease both;
  }


  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2.6rem;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1.1;
    text-shadow: 0 2px 16px rgba(0,0,0,0.5);
  }

  .header h1 span {
    color: #93c5fd;
  }

  .header .subtitle-en {
    color: rgba(255,255,255,0.75);
    font-size: 1rem;
    margin-top: 8px;
    font-weight: 600;
    letter-spacing: 0.5px;
    font-style: italic;
  }

  .header .subtitle {
    color: rgba(255,255,255,0.9);
    font-size: 1rem;
    margin-top: 4px;
    font-weight: 700;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 26px 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border: 1.5px solid rgba(96,165,250,0.18);
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.2s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--blue-deep);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* INPUTS */
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid var(--blue-pale);
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 600;
    color: var(--text);
    background: var(--blue-bg);
    outline: none;
    margin-bottom: 12px;
    transition: border 0.2s, box-shadow 0.2s;
  }

  input[type="text"]::placeholder, input[type="password"]::placeholder {
    color: #94a3b8;
    font-weight: 500;
  }

  input:focus {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: white;
  }

  /* BUTTONS */
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }

  .btn-submit {
    background: linear-gradient(135deg, var(--blue-mid), var(--accent2));
    color: white;
    box-shadow: 0 4px 16px rgba(37,99,235,0.3);
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(37,99,235,0.4);
  }

  .btn-submit:active { transform: translateY(0); }

  .btn-pick {
    background: linear-gradient(135deg, #0ea5e9, #38bdf8);
    color: white;
    margin-top: 12px;
    box-shadow: 0 4px 16px rgba(14,165,233,0.3);
  }

  .btn-pick:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(14,165,233,0.4);
  }

  /* NAME LIST */
  .name-list {
    list-style: none;
    margin-bottom: 4px;
  }

  .name-list li {
    padding: 13px 16px;
    background: var(--blue-bg);
    border-radius: 12px;
    margin-bottom: 8px;
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    border-left: 4px solid var(--blue-mid);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideIn 0.35s ease both;
    transition: box-shadow 0.2s, transform 0.2s;
  }

  .name-list li:hover {
    box-shadow: var(--shadow);
    transform: translateX(3px);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .name-list li .num {
    background: var(--blue-mid);
    color: white;
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 900;
    flex-shrink: 0;
  }

  .name-list li span.proposer {
    color: var(--blue-mid);
    font-weight: 800;
  }

  /* COUNT */
  .count {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.92rem;
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* MESSAGES */
  .msg { font-size: 0.9rem; font-weight: 700; text-align: center; min-height: 22px; margin-bottom: 10px; }
  .msg.error { color: var(--error); }
  .msg.success { color: var(--success); }

  /* WINNER BOX */
  .winner-box {
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
    color: white;
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-top: 14px;
    display: none;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .winner-box h3 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.1rem;
    opacity: 0.9;
    margin-bottom: 6px;
  }

  .winner-box .winner-name {
    font-family: 'Baloo 2', cursive;
    font-size: 2.4rem;
    font-weight: 800;
    margin: 8px 0;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
    letter-spacing: 1px;
  }

  .winner-box .confetti { font-size: 1.8rem; animation: bounce 1s ease-in-out infinite; }

  /* ADMIN */
  .admin-section {
    border-top: 2px dashed rgba(96,165,250,0.35);
    padding-top: 16px;
    margin-top: 16px;
  }

  .admin-label {
    color: var(--text-muted);
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 10px;
  }

  .admin-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .admin-row input {
    margin: 0;
    flex: 1;
  }

  .btn-reveal {
    width: auto;
    padding: 13px 18px;
    background: var(--blue-deep);
    color: white;
    border-radius: 12px;
    white-space: nowrap;
    font-size: 0.9rem;
  }

  .btn-reveal:hover { background: var(--blue-mid); }

  .admin-msg { font-size: 0.88rem; font-weight: 700; margin-top: 8px; }


</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>Emri i <span>çunit</span> 💙</h1>
    <p class="subtitle-en">Choose a name for our baby boy</p>
    <p class="subtitle">Ai po pret — dhe po dëgjon! 👂💙</p>
  </div>

  <!-- FORMA E PROPOZIMIT -->
  <div class="card">
    <h2>✏️ Propozoni një emër</h2>
    <input type="text" id="childName" placeholder="Emri i çunit" />
    <input type="text" id="proposerName" placeholder="Emri juaj (do të mbahet sekret)" />
    <div class="msg" id="formMsg"></div>
    <button class="btn-submit" onclick="submitName()">🚀 Dërgo Propozimin</button>
  </div>

  <!-- LISTA E EMRAVE -->
  <div class="card">
    <h2>📋 Emrat e Propozuar</h2>
    <p class="count" id="countMsg">Ende nuk ka propozime.</p>
    <ul class="name-list" id="nameList"></ul>

    <div class="winner-box" id="winnerBox">
      <div class="confetti">🏆</div>
      <h3>Emri Fitues është:</h3>
      <div class="winner-name" id="winnerName"></div>
      <div class="confetti">🎊</div>
    </div>

    <!-- ADMIN -->
    <div class="admin-section">
      <p class="admin-label">🔒 Zona e Adminit (vetëm për ty)</p>
      <div class="admin-row">
        <input type="password" id="adminPass" placeholder="Fjalëkalimi i adminit" />
        <button class="btn-reveal" onclick="revealAll()">Zbulo</button>
      </div>
      <div id="adminPanel" style="display:none;">
        <div id="adminNameList" style="margin: 12px 0;"></div>
        <p style="color:var(--text-muted);font-size:0.85rem;font-weight:600;margin-bottom:8px;">Zgjidh fituesin:</p>
        <select id="winnerSelect" style="width:100%;padding:12px 14px;border:2px solid var(--blue-pale);border-radius:12px;font-size:1rem;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);background:var(--blue-bg);outline:none;margin-bottom:10px;"></select>
        <button class="btn-pick" onclick="declareWinner()" style="margin-top:0;">🏆 Shpall Fituesin</button>
      </div>
      <div class="admin-msg" id="adminMsg"></div>
    </div>
  </div>

</div>

<script>
  const ADMIN_PASSWORD = "admin123";
  const MASTER_KEY = "$2a$10$e5tzvVVp0acvCgvEprqp5uobWUazIP7Gidu6JRKV5lNC1pa/tiMEW";
  const BIN_ID = "69ec1afd36566621a8ebf3e4";
  let entries = [];
  let revealed = false;

  async function getBinId() {
    return BIN_ID;
  }

  async function initBin() {
    await loadEntries();
  }

  async function loadEntries() {
    try {
      const id = await getBinId() || BIN_ID;
      const res = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
        headers: { 'X-Master-Key': MASTER_KEY }
      });
      const data = await res.json();
      entries = data.record.entries || [];
      renderList();
    } catch(e) { console.error(e); }
  }

  async function saveEntries() {
    const id = BIN_ID;
    await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': MASTER_KEY
      },
      body: JSON.stringify({ entries })
    });
  }

  async function submitName() {
    const childName = document.getElementById('childName').value.trim();
    const proposerName = document.getElementById('proposerName').value.trim();
    const msg = document.getElementById('formMsg');
    const btn = document.querySelector('.btn-submit');

    if (!childName || !proposerName) {
      showMsg(msg, 'error', '⚠️ Ju lutemi plotësoni të dyja fushat!');
      return;
    }

    if (entries.find(e => e.childName.toLowerCase() === childName.toLowerCase())) {
      showMsg(msg, 'error', '⚠️ Ky emër është propozuar tashmë!');
      return;
    }

    btn.textContent = '⏳ Duke dërguar...';
    btn.disabled = true;
    entries.push({ childName, proposerName });
    await saveEntries();
    document.getElementById('childName').value = '';
    document.getElementById('proposerName').value = '';
    btn.textContent = '🚀 Dërgo Propozimin';
    btn.disabled = false;
    showMsg(msg, 'success', '✅ Propozimi u dërgua me sukses!');
    setTimeout(() => msg.textContent = '', 3000);
    renderList();
  }

  function showMsg(el, type, text) {
    el.className = 'msg ' + type;
    el.textContent = text;
  }

  function renderList() {
    const list = document.getElementById('nameList');
    const countMsg = document.getElementById('countMsg');
    if (entries.length === 0) {
      countMsg.textContent = 'Ende nuk ka propozime.';
      list.innerHTML = '';
      return;
    }
    countMsg.textContent = `${entries.length} emër/emra të propozuar:`;
    list.innerHTML = entries.map((e, i) => {
      const numEl = `<span class="num">${i+1}</span>`;
      if (revealed) {
        return `<li>${numEl} <strong>${e.childName}</strong> &mdash; nga <span class="proposer">${e.proposerName}</span></li>`;
      } else {
        return `<li>${numEl} <strong>${e.childName}</strong></li>`;
      }
    }).join('');
  }

  async function revealAll() {
    const pass = document.getElementById('adminPass').value;
    const msg = document.getElementById('adminMsg');
    if (pass === ADMIN_PASSWORD) {
      await loadEntries();
      revealed = true;
      renderList();
      document.getElementById('adminPanel').style.display = 'block';
      populateWinnerSelect();
      msg.style.color = '#10b981';
      msg.textContent = '✅ Hyrja e adminit u krye me sukses!';
    } else {
      msg.style.color = '#ef4444';
      msg.textContent = '❌ Fjalëkalim i gabuar!';
    }
  }

  function populateWinnerSelect() {
    const sel = document.getElementById('winnerSelect');
    sel.innerHTML = entries.map((e, i) =>
      `<option value="${i}">${e.childName} — nga ${e.proposerName}</option>`
    ).join('');
  }

  function declareWinner() {
    if (entries.length === 0) return;
    const idx = parseInt(document.getElementById('winnerSelect').value);
    const winner = entries[idx];
    document.getElementById('winnerName').textContent = winner.childName;
    const box = document.getElementById('winnerBox');
    box.style.display = 'block';
    box.style.animation = 'none';
    requestAnimationFrame(() => {
      box.style.animation = 'pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both';
    });
  }

  // Init on load
  initBin();
</script>
</body>
</html>
